<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidSounds Test Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 2rem;
      color: #fff;
      letter-spacing: 0.1em;
    }

    h2 {
      font-size: 0.9rem;
      font-weight: 400;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      margin-top: 2rem;
    }

    .section {
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    button {
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    button:active {
      background: rgba(255,255,255,0.15);
    }

    button.active {
      background: rgba(100, 180, 255, 0.2);
      border-color: rgba(100, 180, 255, 0.4);
    }

    button.stop {
      background: rgba(255, 100, 100, 0.1);
      border-color: rgba(255, 100, 100, 0.2);
    }

    button.stop:hover {
      background: rgba(255, 100, 100, 0.2);
    }

    .init-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .init-overlay button {
      padding: 1.5rem 3rem;
      font-size: 1.2rem;
      background: rgba(100, 180, 255, 0.2);
      border-color: rgba(100, 180, 255, 0.4);
    }

    .init-overlay.hidden {
      display: none;
    }

    .controls {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .slider-group {
      margin-bottom: 1rem;
    }

    .slider-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: #888;
    }

    input[type="range"] {
      width: 200px;
      margin-right: 1rem;
    }

    .slider-value {
      color: #fff;
      font-size: 0.85rem;
    }

    .status {
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #888;
    }

    .ambient-status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #888;
    }

    .ambient-status span {
      color: #64b4ff;
    }
  </style>
</head>
<body>
  <div class="init-overlay" id="initOverlay">
    <button onclick="initAudio()">Click to Initialize Audio</button>
  </div>

  <h1>VoidSounds Test Page</h1>

  <div class="section">
    <h2>Ambient Soundscapes</h2>
    <div class="buttons">
      <button onclick="playAmbient('hush')">hush</button>
      <button onclick="playAmbient('deep')">deep</button>
      <button onclick="playAmbient('forming')">forming</button>
      <button onclick="playAmbient('threshold')">threshold</button>
      <button class="stop" onclick="stopAmbient()">Stop</button>
    </div>
    <div class="buttons" style="margin-top: 0.75rem;">
      <button onclick="crossfade('hush')">crossfade to hush</button>
      <button onclick="crossfade('deep')">crossfade to deep</button>
      <button onclick="crossfade('forming')">crossfade to forming</button>
      <button onclick="crossfade('threshold')">crossfade to threshold</button>
    </div>
    <div class="ambient-status">
      Currently playing: <span id="ambientStatus">none</span>
    </div>
  </div>

  <div class="section">
    <h2>UI Sounds</h2>
    <div class="buttons">
      <button onclick="VoidSounds.ui.press()">press</button>
      <button onclick="VoidSounds.ui.enter()">enter</button>
      <button onclick="VoidSounds.ui.name()">name</button>
      <button onclick="VoidSounds.ui.begin()">begin</button>
      <button onclick="VoidSounds.ui.bell()">bell</button>
    </div>
  </div>

  <div class="section">
    <h2>Cosmic Events</h2>
    <div class="buttons">
      <button onclick="VoidSounds.cosmic.clump()">clump</button>
      <button onclick="VoidSounds.cosmic.ignition()">ignition</button>
      <button onclick="VoidSounds.cosmic.stageCross()">stageCross</button>
      <button onclick="VoidSounds.cosmic.ritual()">ritual</button>
    </div>
  </div>

  <div class="controls">
    <h2 style="margin-top: 0;">Volume Controls</h2>

    <div class="slider-group">
      <label>Master</label>
      <input type="range" id="masterVol" min="0" max="100" value="70" oninput="setVol('master', this.value)">
      <span class="slider-value" id="masterVal">70%</span>
    </div>

    <div class="slider-group">
      <label>Ambient</label>
      <input type="range" id="ambientVol" min="0" max="100" value="80" oninput="setVol('ambient', this.value)">
      <span class="slider-value" id="ambientVal">80%</span>
    </div>

    <div class="slider-group">
      <label>UI</label>
      <input type="range" id="uiVol" min="0" max="100" value="40" oninput="setVol('ui', this.value)">
      <span class="slider-value" id="uiVal">40%</span>
    </div>

    <div class="slider-group">
      <label>Cosmic</label>
      <input type="range" id="cosmicVol" min="0" max="100" value="90" oninput="setVol('cosmic', this.value)">
      <span class="slider-value" id="cosmicVal">90%</span>
    </div>

    <div class="buttons" style="margin-top: 1rem;">
      <button onclick="saveSettings()">Save Settings</button>
      <button onclick="loadSettings()">Load Settings</button>
    </div>

    <div class="status" id="status">Ready</div>
  </div>

  <script src="void-sounds.js"></script>
  <script>
    function initAudio() {
      VoidSounds.init();
      document.getElementById('initOverlay').classList.add('hidden');
      updateStatus('Audio initialized');
      loadSettings();
    }

    function playAmbient(name) {
      VoidSounds.ambient.play(name);
      document.getElementById('ambientStatus').textContent = name;
      updateStatus('Playing ambient: ' + name);
    }

    function stopAmbient() {
      VoidSounds.ambient.stop(1);
      setTimeout(() => {
        document.getElementById('ambientStatus').textContent = 'none';
      }, 1000);
      updateStatus('Stopping ambient with 1s fade');
    }

    function crossfade(name) {
      VoidSounds.ambient.crossfade(name, 2);
      document.getElementById('ambientStatus').textContent = name + ' (crossfading)';
      setTimeout(() => {
        document.getElementById('ambientStatus').textContent = name;
      }, 2000);
      updateStatus('Crossfading to: ' + name);
    }

    function setVol(category, value) {
      const normalized = value / 100;
      VoidSounds.setVolume(category, normalized);
      document.getElementById(category + 'Val').textContent = value + '%';
      updateStatus('Set ' + category + ' volume to ' + value + '%');
    }

    function saveSettings() {
      VoidSounds.saveSettings();
      updateStatus('Settings saved to localStorage');
    }

    function loadSettings() {
      VoidSounds.loadSettings();
      const s = VoidSounds.getSettings();

      document.getElementById('masterVol').value = s.master * 100;
      document.getElementById('masterVal').textContent = Math.round(s.master * 100) + '%';

      document.getElementById('ambientVol').value = s.ambient * 100;
      document.getElementById('ambientVal').textContent = Math.round(s.ambient * 100) + '%';

      document.getElementById('uiVol').value = s.ui * 100;
      document.getElementById('uiVal').textContent = Math.round(s.ui * 100) + '%';

      document.getElementById('cosmicVol').value = s.cosmic * 100;
      document.getElementById('cosmicVal').textContent = Math.round(s.cosmic * 100) + '%';

      updateStatus('Settings loaded from localStorage');
    }

    function updateStatus(msg) {
      document.getElementById('status').textContent = new Date().toLocaleTimeString() + ' — ' + msg;
    }
  </script>
</body>
</html>
