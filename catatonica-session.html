<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catatonica — The Void</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --void: #0d1b2a;
      --void-deep: #050f1e;
      --gold: #d4a830;
      --text: rgba(237,232,223,0.85);
      --text-dim: rgba(237,232,223,0.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--void); }
    body { cursor: none; }

    canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

    /* ── ESCAPE TAB ── */
    .escape-tab { position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 100; }
    .escape-handle {
      width: 26px; height: 72px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05); border-right: none;
      display: flex; align-items: center; justify-content: center;
      cursor: none; transition: background 0.4s, width 0.4s;
      border-radius: 4px 0 0 4px;
    }
    .escape-handle:hover { background: rgba(255,255,255,0.05); width: 34px; }
    .escape-chevron {
      font-size: 0.38rem; color: rgba(255,255,255,0.15);
      letter-spacing: 0.12em; writing-mode: vertical-rl;
      font-family: 'DM Mono', monospace; text-transform: uppercase;
    }

    /* ── ESCAPE PANEL ── */
    .escape-panel {
      position: fixed; right: -280px; top: 50%; transform: translateY(-50%);
      width: 260px;
      background: rgba(13,27,42,0.92);
      border: 1px solid rgba(255,255,255,0.06); border-right: none;
      padding: 2.5rem 2rem; z-index: 99;
      transition: right 0.5s cubic-bezier(0.16,1,0.3,1);
      border-radius: 8px 0 0 8px;
      backdrop-filter: blur(16px);
    }
    .escape-panel.open { right: 0; }
    .panel-timer {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; font-weight: 300;
      color: rgba(237,232,223,0.45);
      letter-spacing: 0.05em; text-align: center; margin-bottom: 0.3rem;
    }
    .panel-label {
      font-family: 'DM Mono', monospace; font-size: 0.4rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--text-dim); text-align: center; margin-bottom: 0.5rem;
    }
    .panel-catatons {
      font-family: 'DM Mono', monospace; font-size: 0.46rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(212,168,48,0.45); text-align: center; margin-bottom: 2.5rem;
    }
    .progress-ring { display: block; margin: 0 auto 2rem; }
    .panel-exit {
      font-family: 'DM Mono', monospace; font-size: 0.48rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(237,232,223,0.22); background: transparent;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 0.8rem 1rem; width: 100%; cursor: none; transition: all 0.3s;
    }
    .panel-exit:hover { color: rgba(237,232,223,0.55); border-color: rgba(255,255,255,0.14); }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.9s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }
    .screen.gone { display: none; }

    /* Session screen: transparent — canvas is the visual */
    #sessionScreen { background: transparent; pointer-events: none; }

    /* ── SETUP SCREEN ── */
    #setupScreen { background: transparent; }

    .setup-inner {
      text-align: center; max-width: 420px; padding: 2.5rem 2.5rem 2.2rem;
      background: rgba(10,22,36,0.75);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(20px); border-radius: 2px;
    }
    .setup-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 0.44rem;
      letter-spacing: 0.42em; text-transform: uppercase;
      color: rgba(212,168,48,0.38); margin-bottom: 1.4rem;
    }
    .setup-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.7rem; font-weight: 300;
      color: rgba(237,232,223,0.85); line-height: 1.1; margin-bottom: 0.5rem;
    }
    .setup-title em { font-style: italic; color: var(--gold); }
    .setup-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.88rem; font-style: italic;
      color: rgba(237,232,223,0.22); margin-bottom: 2.2rem; line-height: 1.8;
    }

    .mode-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 1px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1.5rem;
    }
    .mode-btn {
      background: rgba(10,22,36,0.85); padding: 1.3rem 0.6rem;
      border: none; cursor: none; transition: background 0.35s; text-align: center;
      position: relative; overflow: hidden;
    }
    .mode-btn::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(212,168,48,0.07); opacity: 0; transition: opacity 0.35s;
    }
    .mode-btn.active::after { opacity: 1; }
    .mode-btn.active { background: rgba(10,22,36,0.6); }
    .mode-name {
      font-family: 'DM Mono', monospace; font-size: 0.42rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(237,232,223,0.22); display: block; margin-bottom: 0.38rem;
      transition: color 0.3s; position: relative; z-index: 1;
    }
    .mode-btn.active .mode-name { color: rgba(212,168,48,0.78); }
    .mode-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem; font-style: italic;
      color: rgba(237,232,223,0.14); display: block;
      position: relative; z-index: 1; transition: color 0.3s;
    }
    .mode-btn.active .mode-desc { color: rgba(237,232,223,0.28); }

    .dur-row {
      display: flex; gap: 1px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 1.8rem;
    }
    .dur-btn {
      flex: 1; background: rgba(10,22,36,0.85); border: none;
      padding: 0.85rem 0; cursor: none;
      font-family: 'DM Mono', monospace; font-size: 0.42rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(237,232,223,0.18); transition: all 0.3s;
    }
    .dur-btn:hover { background: rgba(255,255,255,0.02); color: rgba(237,232,223,0.38); }
    .dur-btn.active { background: rgba(212,168,48,0.05); color: rgba(212,168,48,0.75); }

    .begin-btn {
      font-family: 'DM Mono', monospace; font-size: 0.5rem;
      letter-spacing: 0.3em; text-transform: uppercase; cursor: none;
      background: rgba(237,232,223,0.88); color: #0d1b2a;
      border: none; padding: 1.1rem 2rem; width: 100%;
      transition: background 0.3s, transform 0.2s, letter-spacing 0.3s;
    }
    .begin-btn:hover { background: var(--gold); transform: translateY(-1px); letter-spacing: 0.36em; }

    /* Mode label flash at session start */
    .mode-indicator {
      position: fixed; bottom: 3.5rem; left: 50%; transform: translateX(-50%);
      font-family: 'DM Mono', monospace; font-size: 0.36rem;
      letter-spacing: 0.5em; text-transform: uppercase;
      color: rgba(237,232,223,0.07); pointer-events: none; z-index: 10;
      transition: opacity 2s ease;
    }
    .mode-indicator.visible { opacity: 1; color: rgba(237,232,223,0.12); }
    .mode-indicator.faded { opacity: 0; }

    /* ── COMPLETE SCREEN ── */
    #completeScreen {
      background: radial-gradient(ellipse at center, rgba(13,27,42,0.98) 0%, rgba(5,15,30,0.99) 65%);
    }
    .complete-inner {
      text-align: center; max-width: 400px; padding: 2rem;
      animation: fadeUp 1.4s ease forwards; opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Animated star on complete screen */
    .star-orb {
      width: 88px; height: 88px; border-radius: 50%;
      margin: 0 auto 2.8rem; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .star-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(212,168,48,0.12);
      animation: ringPulse 4s ease-in-out infinite;
    }
    .star-ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; }
    .star-ring:nth-child(2) { width: 68%; height: 68%; animation-delay: 0.7s; border-color: rgba(212,168,48,0.18); }
    .star-ring:nth-child(3) { width: 40%; height: 40%; animation-delay: 1.4s; border-color: rgba(212,168,48,0.25); }
    @keyframes ringPulse {
      0%,100% { transform: scale(1); opacity: 0.4; }
      50%      { transform: scale(1.1); opacity: 1; }
    }
    .star-core {
      width: 9px; height: 9px; border-radius: 50%;
      background: radial-gradient(circle, #fff8e8 0%, var(--gold) 55%, transparent 100%);
      position: relative; z-index: 2;
      box-shadow: 0 0 10px 3px rgba(212,168,48,0.45), 0 0 28px 10px rgba(212,168,48,0.12);
      animation: corePulse 3.5s ease-in-out infinite;
    }
    @keyframes corePulse {
      0%,100% { transform: scale(1); opacity: 0.85; }
      50%      { transform: scale(1.4); opacity: 1; }
    }

    .complete-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem; font-weight: 300;
      color: rgba(237,232,223,0.85); margin-bottom: 0.5rem;
    }
    .complete-title em { font-style: italic; color: var(--gold); }
    .complete-dur {
      font-family: 'DM Mono', monospace; font-size: 0.44rem;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(212,168,48,0.48); margin-bottom: 2rem; display: block;
    }
    .complete-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; font-style: italic;
      color: rgba(237,232,223,0.28); line-height: 1.9; margin-bottom: 3rem;
      border-left: 1px solid rgba(212,168,48,0.18); padding-left: 1.2rem; text-align: left;
    }
    .complete-actions { display: flex; gap: 1rem; justify-content: center; }
    .btn-return {
      font-family: 'DM Mono', monospace; font-size: 0.48rem;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: none;
      background: rgba(237,232,223,0.85); color: #0d1b2a;
      border: none; padding: 0.9rem 2rem;
      text-decoration: none; display: inline-block; transition: background 0.3s;
    }
    .btn-return:hover { background: var(--gold); }
    .btn-again {
      font-family: 'DM Mono', monospace; font-size: 0.48rem;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: none;
      background: transparent; color: rgba(237,232,223,0.28);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 0.9rem 1.6rem; transition: all 0.3s;
    }
    .btn-again:hover { color: rgba(237,232,223,0.6); border-color: rgba(255,255,255,0.15); }

    /* cursor */
    .cursor {
      position: fixed; width: 4px; height: 4px;
      background: rgba(212,168,48,0.5); border-radius: 50%;
      pointer-events: none; z-index: 9999; transform: translate(-50%,-50%);
      transition: width 0.15s, height 0.15s, opacity 0.3s;
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <canvas id="voidCanvas"></canvas>

  <div class="mode-indicator" id="modeIndicator"></div>

  <!-- ESCAPE TAB -->
  <div class="escape-tab">
    <div class="escape-handle" id="escapeHandle">
      <span class="escape-chevron">esc</span>
    </div>
  </div>

  <!-- ESCAPE PANEL -->
  <div class="escape-panel" id="escapePanel">
    <svg class="progress-ring" width="70" height="70" viewBox="0 0 70 70">
      <circle cx="35" cy="35" r="28" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <circle id="progressRing" cx="35" cy="35" r="28" fill="none"
        stroke="rgba(212,168,48,0.32)" stroke-width="1"
        stroke-dasharray="175.9" stroke-dashoffset="175.9"
        stroke-linecap="round" transform="rotate(-90 35 35)"/>
    </svg>
    <div class="panel-timer" id="panelTimer">00:00</div>
    <div class="panel-label">remaining</div>
    <div class="panel-catatons" id="panelCatatons">0 Catatons earned</div>
    <button class="panel-exit" id="exitBtn">End Early →</button>
  </div>

  <!-- SETUP SCREEN -->
  <div class="screen" id="setupScreen">
    <div class="setup-inner">
      <p class="setup-eyebrow">New Session</p>
      <h1 class="setup-title">Enter the <em>void.</em></h1>
      <p class="setup-sub">Choose how you want to sit with it.</p>

      <div class="mode-grid">
        <button class="mode-btn active" data-mode="silence">
          <span class="mode-name">The Void</span>
          <span class="mode-desc">pure silence</span>
        </button>
        <button class="mode-btn" data-mode="sound">
          <span class="mode-name">Threshold</span>
          <span class="mode-desc">birthing pressure</span>
        </button>
        <button class="mode-btn" data-mode="visual">
          <span class="mode-name">Ignition</span>
          <span class="mode-desc">the big bang</span>
        </button>
      </div>

      <div class="dur-row">
        <button class="dur-btn" data-min="5">5m</button>
        <button class="dur-btn active" data-min="10">10m</button>
        <button class="dur-btn" data-min="15">15m</button>
        <button class="dur-btn" data-min="20">20m</button>
        <button class="dur-btn" data-min="30">30m</button>
      </div>

      <button class="begin-btn" id="beginBtn">Enter the Void →</button>
    </div>
  </div>

  <!-- SESSION SCREEN (transparent — canvas is the session) -->
  <div class="screen hidden gone" id="sessionScreen"></div>

  <!-- COMPLETE SCREEN -->
  <div class="screen hidden gone" id="completeScreen">
    <div class="complete-inner">
      <div class="star-orb">
        <div class="star-ring"></div>
        <div class="star-ring"></div>
        <div class="star-ring"></div>
        <div class="star-core"></div>
      </div>
      <h2 class="complete-title">You <em>stayed.</em></h2>
      <span class="complete-dur" id="completeDuration"></span>
      <p class="complete-quote" id="completeQuote"></p>
      <div class="complete-actions">
        <a href="app.html" class="btn-return">Return →</a>
        <button class="btn-again" id="goAgainBtn">Again</button>
      </div>
    </div>
  </div>

  <script>
  // ── URL PARAMS ──
  const urlParams = new URLSearchParams(window.location.search);
  const sessionCtx = urlParams.has('mode') ? {
    sitId:    urlParams.get('sitId') || null,
    mode:     urlParams.get('mode') || 'silence',
    duration: parseInt(urlParams.get('duration')) || 10,
    userId:   urlParams.get('userId') || null,
    catatons: parseInt(urlParams.get('catatons')) || 0,
  } : null;

  // ── STATE ──
  const state = {
    mode:         sessionCtx?.mode || 'silence',
    duration:     sessionCtx?.duration || 10,
    sitId:        sessionCtx?.sitId || null,
    catatons:     sessionCtx?.catatons || 0,
    secondsLeft:  0,
    totalSeconds: 0,
    timer:        null,
    audioCtx:     null,
    soundNodes:   [],
    breathPhase:  'in',
    breathTimer:  null,
    running:      false,
  };

  if (sessionCtx) {
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === state.mode));
    document.querySelectorAll('.dur-btn').forEach(b =>
      b.classList.toggle('active', parseInt(b.dataset.min) === state.duration));
    setTimeout(() => startSession(), 120);
  }

  // ── CURSOR ──
  const cursorEl = document.getElementById('cursor');
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px'; cursorEl.style.top = my + 'px';
  });
  document.querySelectorAll('button, a').forEach(el => {
    el.addEventListener('mouseenter', () => { cursorEl.style.width='8px'; cursorEl.style.height='8px'; });
    el.addEventListener('mouseleave', () => { cursorEl.style.width='4px'; cursorEl.style.height='4px'; });
  });

  // ── ESCAPE PANEL ──
  const panel = document.getElementById('escapePanel');
  let panelOpen = false;
  document.getElementById('escapeHandle').addEventListener('click', () => {
    panelOpen = !panelOpen;
    panel.classList.toggle('open', panelOpen);
  });

  // ── MODE & DURATION SELECTION ──
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
    });
  });
  document.querySelectorAll('.dur-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.duration = parseInt(btn.dataset.min);
    });
  });

  // ── SCREEN TRANSITIONS ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.add('hidden');
      if (s.id !== id) setTimeout(() => s.classList.add('gone'), 900);
    });
    const target = document.getElementById(id);
    if (!target) return;
    target.classList.remove('gone');
    requestAnimationFrame(() => requestAnimationFrame(() => target.classList.remove('hidden')));
  }

  // ── BEGIN ──
  document.getElementById('beginBtn').addEventListener('click', startSession);

  function startSession() {
    state.secondsLeft  = state.duration * 60;
    state.totalSeconds = state.duration * 60;
    state.running      = true;

    showScreen('sessionScreen');

    // Mode label flash
    const ind = document.getElementById('modeIndicator');
    const modeNames = { silence: 'The Void', sound: 'The Threshold', visual: 'The Ignition' };
    ind.textContent = modeNames[state.mode] || '';
    ind.classList.add('visible');
    setTimeout(() => ind.classList.add('faded'), 3000);

    if (state.mode === 'sound')  startAmbientSound();
    if (state.mode === 'visual') startBreathCycle();

    updatePanel();
    state.timer = setInterval(tick, 1000);
    voidEngine.start(state.mode, state.catatons);
  }

  // ── TIMER ──
  function tick() {
    state.secondsLeft--;
    if (state.secondsLeft <= 0) {
      clearInterval(state.timer);
      endSession(false);
    } else {
      updatePanel();
    }
  }

  function updatePanel() {
    const m = Math.floor(state.secondsLeft / 60);
    const s = state.secondsLeft % 60;
    document.getElementById('panelTimer').textContent =
      String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    const progress = 1 - (state.secondsLeft / state.totalSeconds);
    document.getElementById('progressRing').style.strokeDashoffset =
      175.9 - progress * 175.9;
    const earned = Math.max(0, Math.floor((state.totalSeconds - state.secondsLeft) / 60));
    document.getElementById('panelCatatons').textContent =
      earned + (earned === 1 ? ' Cataton earned' : ' Catatons earned');
  }

  // ── END ──
  function endSession(early = false) {
    clearInterval(state.timer);
    stopAmbientSound();
    stopBreathCycle();
    state.running = false;
    panel.classList.remove('open');
    panelOpen = false;

    voidEngine.triggerStar();
    playBell();

    const elapsed = state.totalSeconds - state.secondsLeft;
    const catatonsEarned = Math.max(1, Math.round(state.duration * (elapsed / state.totalSeconds)));

    if (state.sitId) {
      sessionStorage.setItem('cat_session_result', JSON.stringify({
        sitId: state.sitId, catatonsEarned, completed: !early,
      }));
    }

    setTimeout(() => {
      voidEngine.stop();
      const elapsedMin = Math.floor(elapsed / 60);
      const elapsedSec = elapsed % 60;
      document.getElementById('completeDuration').textContent = early
        ? `${elapsedMin}m ${elapsedSec}s · +${catatonsEarned} Catatons`
        : `${state.duration} minutes · +${catatonsEarned} Catatons`;

      const quotes = [
        'The mind that rests, decides better.',
        'You gave yourself permission to stop. That takes more courage than you think.',
        'What surfaces in silence is more honest than anything the noise told you.',
        'The gaps you protect are where the next version of you is built.',
        'Stillness is not the absence of thought — it is the condition for better ones.',
        'You stayed. That is enough.',
        'Something in you just became more real.',
        'Nothing you carry is meant to be carried forever.',
      ];
      document.getElementById('completeQuote').textContent =
        quotes[Math.floor(Math.random() * quotes.length)];
      showScreen('completeScreen');
    }, early ? 900 : 2200);
  }

  document.getElementById('exitBtn').addEventListener('click', () => endSession(true));
  document.getElementById('goAgainBtn').addEventListener('click', () => {
    window.location.href = state.sitId ? 'app.html' : 'catatonica-session.html';
  });

  // ── BELL ──
  function playBell() {
    try {
      const ac = new AudioContext();
      [[432, 0.28, 0], [864, 0.12, 0.06], [1296, 0.06, 0.12]].forEach(([freq, vol, delay]) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.frequency.value = freq; o.type = 'sine';
        const t0 = ac.currentTime + delay;
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(vol, t0 + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t0 + 5);
        o.start(t0); o.stop(t0 + 5);
      });
    } catch(e) {}
  }

  // ── AMBIENT SOUND (Threshold: pressurized, wave-based) ──
  function startAmbientSound() {
    try {
      const ac = new AudioContext();
      state.audioCtx = ac;
      state.soundNodes = [];

      // Brown noise base
      const bufSize = ac.sampleRate * 8;
      const buf = ac.createBuffer(2, bufSize, ac.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = buf.getChannelData(ch);
        let last = 0;
        for (let i = 0; i < bufSize; i++) {
          const w = Math.random() * 2 - 1;
          last = (last + 0.02 * w) / 1.02;
          d[i] = last * 3.5;
        }
      }
      const noise = ac.createBufferSource();
      noise.buffer = buf; noise.loop = true;

      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 110;

      const master = ac.createGain();
      master.gain.setValueAtTime(0, ac.currentTime);
      master.gain.linearRampToValueAtTime(0.1, ac.currentTime + 4);

      noise.connect(lp); lp.connect(master); master.connect(ac.destination);
      noise.start();
      state.soundNodes.push(noise, master);

      // Slow pressure wave on gain
      const lfo = ac.createOscillator();
      const lfoG = ac.createGain();
      lfo.frequency.value = 0.055; lfoG.gain.value = 0.05;
      lfo.connect(lfoG); lfoG.connect(master.gain);
      lfo.start();
      state.soundNodes.push(lfo);

      // Sub tones
      [58, 87].forEach((freq, i) => {
        const osc = ac.createOscillator(), g = ac.createGain();
        osc.frequency.value = freq; osc.type = 'sine'; g.gain.value = 0.035;
        const tl = ac.createOscillator(), tlg = ac.createGain();
        tl.frequency.value = 0.04 + i * 0.02; tlg.gain.value = 0.018;
        tl.connect(tlg); tlg.connect(g.gain); tl.start();
        osc.connect(g); g.connect(ac.destination); osc.start();
        state.soundNodes.push(osc, g, tl);
      });
    } catch(e) {}
  }

  function stopAmbientSound() {
    try {
      const master = state.soundNodes[1];
      if (master?.gain && state.audioCtx) {
        master.gain.linearRampToValueAtTime(0, state.audioCtx.currentTime + 1.5);
      }
      setTimeout(() => {
        state.soundNodes.forEach(n => { try { n.stop?.(); } catch(e){} });
        state.audioCtx?.close(); state.audioCtx = null; state.soundNodes = [];
      }, 1600);
    } catch(e) {}
  }

  // ── BREATH CYCLE ──
  function startBreathCycle() {
    state.breathPhase = 'in';
    runBreath();
  }
  function runBreath() {
    const dur = state.breathPhase === 'in' ? 4000 :
                state.breathPhase === 'hold' ? 2000 : 5000;
    state.breathTimer = setTimeout(() => {
      const prev = state.breathPhase;
      if (prev === 'in')   state.breathPhase = 'hold';
      else if (prev === 'hold') state.breathPhase = 'out';
      else state.breathPhase = 'in';
      // Fire shockwave at the moment exhale begins
      if (state.breathPhase === 'out') voidEngine.addShockwave();
      if (state.running) runBreath();
    }, dur);
  }
  function stopBreathCycle() { clearTimeout(state.breathTimer); }

  // ═══════════════════════════════════════════════════════════════
  // ── THE VOID ENGINE — Cosmological particle system
  //
  // The void begins broken. Particles are fragments: cold, dim,
  // scattered. As session progresses, gravity strengthens. Particles
  // clump, warm from teal → violet → amber → gold. A star is born.
  // ═══════════════════════════════════════════════════════════════
  const voidEngine = (() => {
    const canvas = document.getElementById('voidCanvas');
    const ctx    = canvas.getContext('2d');

    let W = 0, H = 0, CX = 0, CY = 0;
    let particles  = [];   // main cosmological particles
    let dust       = [];   // background micro-dust (depth)
    let shockwaves = [];   // Ignition: breath-exhale rings
    let waveRings  = [];   // Threshold: pressure wave rings
    let starFlash  = 0;    // 0→1, completion star burst intensity
    let t          = 0;    // global tick
    let sessionProgress = 0; // 0→1 over session duration
    let mode       = 'silence';
    let userCatatons = 0;
    let isSession  = false;
    let running    = false;
    let animId     = null;

    function getStage(c) {
      if (c < 10) return 0; // broken void
      if (c < 30) return 1; // first light
      if (c < 70) return 2; // proto-star
      return 3;             // galaxy
    }

    function resizeCanvas() {
      const oldW = W || window.innerWidth;
      const oldH = H || window.innerHeight;
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      CX = W / 2; CY = H / 2;
      // Rescale particle positions proportionally
      if (particles.length && oldW) {
        const sx = W / oldW, sy = H / oldH;
        const ocx = oldW / 2, ocy = oldH / 2;
        particles.forEach(p => {
          p.x = CX + (p.x - ocx) * sx;
          p.y = CY + (p.y - ocy) * sy;
        });
        dust.forEach(d => { d.x *= sx; d.y *= sy; });
      }
    }

    // ── PARTICLE FACTORY ──
    function makeParticle(stage) {
      const angle = Math.random() * Math.PI * 2;
      const maxR  = Math.min(W, H) * 0.42;
      const minR  = 55;
      // Higher stage = tighter initial scatter (proto-formation)
      const scatter = [1.0, 0.78, 0.58, 0.42][stage];
      const dist    = (minR + Math.random() * (maxR - minR)) * scatter;
      const isFragment = Math.random() < [0.58, 0.32, 0.12, 0.04][stage];

      return {
        x:  CX + Math.cos(angle) * dist,
        y:  CY + Math.sin(angle) * dist,
        vx: (Math.random() - 0.5) * 0.45,
        vy: (Math.random() - 0.5) * 0.45,
        mass:  0.5 + Math.random() * 1.8,
        size:  0.3 + Math.random() * 1.8,
        hue:   182 + Math.random() * 22,
        sat:   22  + Math.random() * 32,
        lit:   5   + Math.random() * 16,
        alpha: 0.05 + Math.random() * 0.32,
        orbit: 0.00012 + Math.random() * 0.00028,
        fragment:  isFragment,
        fragAngle: Math.random() * Math.PI * 2,
        fragSpin:  (Math.random() - 0.5) * 0.018,
        shimmer:   Math.random() * Math.PI * 2,
        sSpeed:    0.008 + Math.random() * 0.018,
      };
    }

    // ── MICRO-DUST FACTORY ──
    function makeDust() {
      return {
        x:       Math.random() * W,
        y:       Math.random() * H,
        vx:      (Math.random() - 0.5) * 0.06,
        vy:      (Math.random() - 0.5) * 0.06,
        size:    0.15 + Math.random() * 0.35,
        alpha:   0.02 + Math.random() * 0.05,
        hue:     180 + Math.random() * 50,
        twinkle: Math.random() * Math.PI * 2,
      };
    }

    function initParticles() {
      const stage = getStage(userCatatons);
      const count = [280, 325, 370, 415][stage];
      particles = [];
      dust      = [];
      for (let i = 0; i < count; i++) particles.push(makeParticle(stage));
      for (let i = 0; i < 140; i++)   dust.push(makeDust());
      shockwaves = []; waveRings = [];
      t = 0; sessionProgress = 0;
    }

    // ── PHYSICS ──
    function update() {
      const stage    = getStage(userCatatons);
      const gravity  = isSession ? 0.00005 + sessionProgress * 0.00030 : 0.000006;
      const maxSpeed = isSession ? 0.55 + sessionProgress * 0.9 : 0.22;

      particles.forEach(p => {
        const dx   = CX - p.x;
        const dy   = CY - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        // ── Central gravity (grows stronger through session) ──
        p.vx += (dx / dist) * gravity * p.mass;
        p.vy += (dy / dist) * gravity * p.mass;

        // ── Mode-specific forces ──
        if (mode === 'silence') {
          // Orbital tendency: particles naturally want to orbit the center
          // The universe expands and contracts — meditative, slow
          const orbStr = p.orbit * (1 - sessionProgress * 0.55);
          p.vx += (-dy / dist) * orbStr;
          p.vy += ( dx / dist) * orbStr;
          // Cosmic breath: whole field gently expands/contracts
          const breathe = Math.sin(t * 0.00045) * 0.000022;
          p.vx += (p.x - CX) * breathe;
          p.vy += (p.y - CY) * breathe;

        } else if (mode === 'sound') {
          // Pressure waves from center — labor, something being born
          const waveAng = t * 0.0022 + dist * 0.009;
          const wavePush = Math.sin(waveAng) * 0.00032 * (1 + sessionProgress * 1.2);
          p.vx += (dx / dist) * wavePush;
          p.vy += (dy / dist) * wavePush;
          // Turbulence — pressure, not peace
          if (Math.random() < 0.25) {
            p.vx += (Math.random() - 0.5) * 0.016;
            p.vy += (Math.random() - 0.5) * 0.016;
          }
          // Chaotic orbital
          p.vx += (-dy / dist) * p.orbit * 0.4 * (Math.random() > 0.5 ? 1 : -1);
          p.vy += ( dx / dist) * p.orbit * 0.4 * (Math.random() > 0.5 ? 1 : -1);

        } else if (mode === 'visual') {
          // Breath-synchronized cosmology
          // Inhale: drawn toward center (compression)
          // Hold: gentle orbit at equilibrium
          // Exhale: pushed outward — a small Big Bang
          const bForce = state.breathPhase === 'in'   ?  0.00068 :
                         state.breathPhase === 'hold'  ?  0.000045 : -0.00048;
          p.vx += (dx / dist) * bForce;
          p.vy += (dy / dist) * bForce;
          if (state.breathPhase === 'hold') {
            p.vx += (-dy / dist) * p.orbit;
            p.vy += ( dx / dist) * p.orbit;
          }
        }

        // ── Shockwave interaction (Ignition exhale rings) ──
        shockwaves.forEach(sw => {
          const pdx = p.x - CX, pdy = p.y - CY;
          const pd  = Math.sqrt(pdx * pdx + pdy * pdy) || 1;
          const diff = Math.abs(pd - sw.r);
          if (diff < 38) {
            const force = (1 - diff / 38) * sw.force;
            p.vx += (pdx / pd) * force;
            p.vy += (pdy / pd) * force;
          }
        });

        // Friction
        p.vx *= 0.983;
        p.vy *= 0.983;

        // Speed cap
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (speed > maxSpeed) { p.vx *= maxSpeed / speed; p.vy *= maxSpeed / speed; }

        p.x += p.vx;
        p.y += p.vy;

        // Soft boundary (no hard wrap — particles drift back from edge)
        const boundary = Math.min(W, H) * 0.54;
        if (dist > boundary) {
          p.vx += (dx / dist) * 0.0025;
          p.vy += (dy / dist) * 0.0025;
        }

        // Fragment rotation
        if (p.fragment) p.fragAngle += p.fragSpin;

        // Shimmer
        p.shimmer += p.sSpeed;

        // ── COLOR EVOLUTION ──
        // Proximity to core + session progress = warmth
        // Cold teal (182°) → blue-violet (260°) → amber (38°) → warm white
        const coreDist = Math.sqrt((p.x - CX) ** 2 + (p.y - CY) ** 2);
        const coreProx = Math.max(0, 1 - coreDist / (Math.min(W, H) * 0.30));
        const warmth   = isSession ? sessionProgress * (0.18 + coreProx * 0.82) : 0;

        if (warmth < 0.28) {
          const w = warmth / 0.28;
          p.hue = 182 + w * 78;   // teal → violet
          p.sat = 22  + w * 48;
          p.lit = 5   + w * 18 + coreProx * 12;
        } else if (warmth < 0.62) {
          const w = (warmth - 0.28) / 0.34;
          p.hue = 260 - w * 222;  // violet → amber/gold
          p.sat = 70  + w * 12;
          p.lit = 23  + w * 34 + coreProx * 22;
        } else {
          const w = (warmth - 0.62) / 0.38;
          p.hue = 38  + w * 18;   // gold → warm white
          p.sat = 82  - w * 68;
          p.lit = 57  + w * 38;
        }

        const shimVal = Math.sin(p.shimmer) * 0.055;
        p.alpha = 0.05
          + coreProx * (isSession ? sessionProgress * 0.78 : 0.08)
          + (isSession ? Math.min(1, sessionProgress * 1.8) * 0.07 : 0)
          + shimVal;
        p.alpha = Math.max(0.03, Math.min(0.98, p.alpha));
      });

      // Dust drift (slow, never attracted to center)
      dust.forEach(d => {
        d.x += d.vx; d.y += d.vy;
        d.twinkle += 0.007;
        if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
        if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
      });

      // Update shockwave rings
      shockwaves = shockwaves.filter(sw => sw.r < sw.maxR);
      shockwaves.forEach(sw => {
        sw.r     += sw.speed;
        sw.alpha *= 0.972;
        sw.force *= 0.94;
      });

      // Generate Threshold pressure rings on interval
      if (mode === 'sound' && isSession && t % 72 === 0) {
        waveRings.push({ r: 6, maxR: Math.min(W, H) * 0.52, alpha: 0.16 * (0.4 + sessionProgress * 0.6) });
      }
      waveRings = waveRings.filter(r => r.r < r.maxR);
      waveRings.forEach(r => { r.r += 2.0; r.alpha *= 0.990; });

      // Star flash decay
      if (starFlash > 0) starFlash *= 0.93;
    }

    // ── RENDER ──
    function render() {
      // ─────────────────────────────────────────────────────────
      // TRAIL EFFECT: fade instead of clearRect.
      // This is what makes particles feel alive — comet tails,
      // motion arcs, the sense that something moved through space.
      // Lower alpha = longer trails (more ghostly history).
      // ─────────────────────────────────────────────────────────
      const trailAlpha = isSession
        ? 0.11 + (1 - sessionProgress) * 0.07
        : 0.22;
      ctx.fillStyle = `rgba(13,27,42,${trailAlpha})`;
      ctx.fillRect(0, 0, W, H);

      // ── NEBULA BACKGROUND ──
      // Primary nebula — expands, warms, intensifies as session progresses
      const nebR   = isSession ? 70 + sessionProgress * Math.min(W, H) * 0.38 : 55;
      const nebHue = 182 + (isSession ? sessionProgress * 78 : 0);
      const nebA   = isSession ? 0.1 + sessionProgress * 0.28 : 0.07;

      const neb = ctx.createRadialGradient(CX, CY, 0, CX, CY, nebR);
      neb.addColorStop(0,   `hsla(${nebHue},45%,${isSession ? 4 + sessionProgress*8 : 3}%,${nebA})`);
      neb.addColorStop(0.5, `hsla(${nebHue},30%,2%,${nebA * 0.45})`);
      neb.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = neb;
      ctx.fillRect(0, 0, W, H);

      // Secondary offset nebula for depth and asymmetry
      if (isSession && sessionProgress > 0.08) {
        const ox = CX + Math.sin(t * 0.00035) * 45;
        const oy = CY + Math.cos(t * 0.00028) * 32;
        const neb2 = ctx.createRadialGradient(ox, oy, 0, ox, oy, nebR * 0.55);
        neb2.addColorStop(0, `hsla(${nebHue + 40},50%,${3 + sessionProgress*5}%,${nebA * 0.28})`);
        neb2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = neb2;
        ctx.fillRect(0, 0, W, H);
      }

      // ── STAGE 3: Galaxy spiral arm hints ──
      if (getStage(userCatatons) === 3 && isSession && sessionProgress > 0.28) {
        const armA = Math.min(0.10, (sessionProgress - 0.28) * 0.16);
        ctx.save();
        ctx.globalAlpha = armA;
        for (let arm = 0; arm < 2; arm++) {
          ctx.beginPath();
          const base = arm * Math.PI + t * 0.000065;
          for (let r = 14; r < Math.min(W, H) * 0.44; r += 1.2) {
            const a  = base + r * 0.019;
            const px = CX + Math.cos(a) * r;
            const py = CY + Math.sin(a) * r;
            r === 14 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.strokeStyle = 'rgba(212,168,48,0.9)';
          ctx.lineWidth   = 0.6;
          ctx.stroke();
        }
        ctx.restore();
      }

      // ── THRESHOLD: Pressure wave rings emanating from center ──
      waveRings.forEach(r => {
        ctx.beginPath();
        ctx.arc(CX, CY, r.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(94,184,204,${r.alpha})`;
        ctx.lineWidth   = 0.7;
        ctx.stroke();
      });

      // ── IGNITION: Exhale shockwave rings ──
      shockwaves.forEach(sw => {
        const p = sw.r / sw.maxR;
        ctx.beginPath();
        ctx.arc(CX, CY, sw.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(212,168,48,${sw.alpha})`;
        ctx.lineWidth   = 2 * (1 - p);
        ctx.stroke();
        // Inner echo ring
        if (sw.r > 20) {
          ctx.beginPath();
          ctx.arc(CX, CY, sw.r * 0.65, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(237,232,223,${sw.alpha * 0.22})`;
          ctx.lineWidth   = 0.5;
          ctx.stroke();
        }
      });

      // ── BACKGROUND DUST ──
      dust.forEach(d => {
        const tw = 0.45 + 0.55 * Math.sin(d.twinkle);
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${d.hue},18%,55%,${d.alpha * tw})`;
        ctx.fill();
      });

      // ── MAIN PARTICLES ──
      particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);

        const fragFade = sessionProgress / 0.52; // fragments fully resolve by 52% session

        if (p.fragment && sessionProgress < 0.52) {
          // Rotating broken shard — the void's debris
          const len = p.size * (2.8 - fragFade * 1.8);
          ctx.rotate(p.fragAngle);
          ctx.beginPath();
          ctx.moveTo(-len, 0);
          ctx.lineTo( len, 0);
          ctx.strokeStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha * (1 - fragFade * 0.45)})`;
          ctx.lineWidth = Math.max(0.3, p.size * 0.55);
          ctx.stroke();
          // Perpendicular cross on heavier fragments
          if (p.mass > 1.3 && fragFade < 0.7) {
            ctx.beginPath();
            ctx.moveTo(0, -len * 0.55);
            ctx.lineTo(0,  len * 0.55);
            ctx.stroke();
          }
        } else {
          // Particle — grows in size as session progresses
          const r = Math.max(0.25, p.size * (0.4 + (isSession ? sessionProgress * 1.0 : 0.08)));
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha})`;
          ctx.fill();

          // Glow halo for hot particles near the forming core
          if (p.lit > 32 && isSession) {
            ctx.beginPath();
            ctx.arc(0, 0, r * 4, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha * 0.1})`;
            ctx.fill();
          }
        }
        ctx.restore();
      });

      // ── CORE FORMATION ──
      // Emerges at 12% session progress — the star nucleus forming
      if (isSession && sessionProgress > 0.12) {
        const cp = Math.min(1, (sessionProgress - 0.12) / 0.52);

        // Outer halo glow
        const haloR = 45 + cp * 90;
        const halo  = ctx.createRadialGradient(CX, CY, 0, CX, CY, haloR);
        halo.addColorStop(0,   `rgba(212,168,48,${cp * 0.20})`);
        halo.addColorStop(0.45,`rgba(180,120,30,${cp * 0.07})`);
        halo.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, W, H);

        // Pulsating emission rings (3 staggered rings emanating from core)
        for (let i = 0; i < 3; i++) {
          const pulse = ((t * 0.007 + i * 0.333) % 1);
          const pR = cp * (12 + pulse * 68);
          const pA = cp * 0.30 * (1 - pulse) * (1 - pulse);
          ctx.beginPath();
          ctx.arc(CX, CY, pR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(212,168,48,${pA})`;
          ctx.lineWidth   = 1.8 * (1 - pulse);
          ctx.stroke();
        }

        // Inner stellar nucleus
        const coreR = 1.8 + cp * 9 + Math.sin(t * 0.022) * cp * 2.2;
        const core  = ctx.createRadialGradient(CX, CY, 0, CX, CY, coreR * 5);
        const cA    = cp * 0.92;
        core.addColorStop(0,   `rgba(255,248,210,${cA})`);
        core.addColorStop(0.25,`rgba(240,200,80,${cA * 0.65})`);
        core.addColorStop(0.6, `rgba(190,130,35,${cA * 0.22})`);
        core.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = core;
        ctx.fillRect(0, 0, W, H);
      }

      // ── IGNITION: Breath ring (visual feedback layer) ──
      if (mode === 'visual') {
        const phase = state.breathPhase;
        const cycleLen = phase === 'in' ? 4000 : phase === 'hold' ? 2000 : 5000;
        const cycleP   = (t % cycleLen) / cycleLen;
        const bR = phase === 'in'   ? 18 + cycleP * 110 :
                   phase === 'hold' ? 128 :
                                      128 - cycleP * 90;
        const bA = phase === 'hold' ? 0.055 : 0.035 + cycleP * 0.045;
        ctx.beginPath();
        ctx.arc(CX, CY, Math.max(1, bR), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(212,168,48,${bA * (isSession ? 1 : 0.25)})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        // Second ring at 1.7x
        ctx.beginPath();
        ctx.arc(CX, CY, Math.max(1, bR * 1.7), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(212,168,48,${bA * 0.35 * (isSession ? 1 : 0.25)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // ── STAR BIRTH FLASH (on session completion) ──
      if (starFlash > 0.01) {
        const sf  = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W, H) * 0.6 * Math.min(1, starFlash * 1.2));
        sf.addColorStop(0,   `rgba(255,255,255,${starFlash * 0.92})`);
        sf.addColorStop(0.08,`rgba(255,235,150,${starFlash * 0.65})`);
        sf.addColorStop(0.3, `rgba(212,168,48,${starFlash * 0.22})`);
        sf.addColorStop(0.7, `rgba(94,60,10,${starFlash * 0.06})`);
        sf.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = sf;
        ctx.fillRect(0, 0, W, H);
      }
    }

    // ── MAIN LOOP ──
    function loop() {
      t++;
      if (isSession && state.totalSeconds > 0) {
        sessionProgress = Math.max(0, Math.min(1, 1 - (state.secondsLeft / state.totalSeconds)));
      }
      update();
      render();
      if (running) animId = requestAnimationFrame(loop);
    }

    return {
      start(m, catatons) {
        mode         = m;
        userCatatons = catatons;
        isSession    = true;
        // Don't re-init — idle void transitions seamlessly into session
      },

      stop() {
        running   = false;
        isSession = false;
        if (animId) { cancelAnimationFrame(animId); animId = null; }
      },

      addShockwave() {
        shockwaves.push({
          r: 10, maxR: Math.min(W, H) * 0.58,
          alpha: 0.55, force: 0.42, speed: 3.8,
        });
      },

      triggerStar() {
        starFlash = 1.0;
      },

      // Boot the idle void (runs on setup screen before session starts)
      initIdle(catatons) {
        userCatatons = catatons || 0;
        resizeCanvas();
        initParticles();
        if (!running) {
          running = true;
          loop();
        }
      },

      resize() {
        resizeCanvas();
      },
    };
  })();

  // ── RESIZE ──
  window.addEventListener('resize', () => voidEngine.resize());

  // ── BOOT ── idle void starts immediately on page load
  voidEngine.initIdle(state.catatons);

  // ── KEYBOARD ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      panelOpen = !panelOpen;
      panel.classList.toggle('open', panelOpen);
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  </script>
</body>
</html>
