<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catatonica — The Void</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    /* ─────────────────────────────────────────────────────────────
       THE ABYSS

       A deep that represents the abyss we're too fearful to enter
       and stare into. Not knowing it's our world, we seek to be
       washed away by the shores, rather than calm them and command
       them to our behest.

       — Immanuel Gabriel, founder's note

       THE FIELD — medium of becoming.
       The Higgs field born of the cataton. Sessions are synthesis.
       The star is what you made. Pressure, heat, mass, gravity —
       all coming together to form a thought.

       — Immanuel Gabriel, April 24 2026, Pass 2 commit
       ───────────────────────────────────────────────────────────── */
  </style>
  <link rel="stylesheet" href="/src/styles/session.css" />
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cat-loader" id="catLoader">
    <div class="cat-loader-dot"></div>
    <p class="cat-loader-text">Entering…</p>
  </div>
  <canvas id="voidCanvas"></canvas>

  <div class="mode-indicator" id="modeIndicator"></div>

  <!-- ESCAPE TAB -->
  <div class="escape-tab">
    <div class="escape-handle" id="escapeHandle">
      <span class="escape-chevron">esc</span>
    </div>
  </div>

  <!-- ESCAPE PANEL -->
  <div class="escape-panel" id="escapePanel">
    <svg class="progress-ring" width="70" height="70" viewBox="0 0 70 70">
      <circle cx="35" cy="35" r="28" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <circle id="progressRing" cx="35" cy="35" r="28" fill="none"
        stroke="rgba(212,168,48,0.32)" stroke-width="1"
        stroke-dasharray="175.9" stroke-dashoffset="175.9"
        stroke-linecap="round" transform="rotate(-90 35 35)"/>
    </svg>
    <div class="panel-timer" id="panelTimer">00:00</div>
    <div class="panel-label">remaining</div>
    <div class="panel-catatons" id="panelCatatons">0 Catatons earned</div>
    <button class="panel-exit" id="exitBtn">End Early →</button>
  </div>

  <!-- SETUP SCREEN -->
  <div class="screen" id="setupScreen">
    <div class="setup-inner">
      <p class="setup-eyebrow">New Session</p>
      <h1 class="setup-title">Enter the <em>void.</em></h1>
      <p class="setup-sub">Choose how you want to sit with it.</p>

      <div class="mode-grid">
        <button class="mode-btn active" data-mode="silence">
          <span class="mode-name">The Void</span>
          <span class="mode-desc">pure silence</span>
        </button>
        <button class="mode-btn" data-mode="sound">
          <span class="mode-name">Threshold</span>
          <span class="mode-desc">birthing pressure</span>
        </button>
        <button class="mode-btn" data-mode="visual">
          <span class="mode-name">Ignition</span>
          <span class="mode-desc">the big bang</span>
        </button>
      </div>

      <div class="dur-row">
        <button class="dur-btn" data-min="5">5m</button>
        <button class="dur-btn active" data-min="10">10m</button>
        <button class="dur-btn" data-min="15">15m</button>
        <button class="dur-btn" data-min="20">20m</button>
        <button class="dur-btn" data-min="30">30m</button>
      </div>

      <button class="begin-btn" id="beginBtn">Enter the Void →</button>
    </div>
  </div>

  <!-- SESSION SCREEN (transparent — canvas is the session) -->
  <div class="screen hidden gone" id="sessionScreen"></div>

  <!-- COMPLETE SCREEN -->
  <div class="screen hidden gone" id="completeScreen">
    <div class="complete-inner">
      <div class="complete-mark" id="completeMark">
        <!-- Rings — stages revealed progressively by JS -->
        <div class="complete-mark-dot"></div>
      </div>
      <h2 class="complete-title">You <em>stayed.</em></h2>
      <span class="complete-dur" id="completeDuration"></span>
      <p class="complete-quote" id="completeQuote"></p>
      <div class="complete-actions">
        <a href="app.html" class="btn-return">Return →</a>
        <button class="btn-again" id="goAgainBtn">Again</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/session-main.js"></script>
</body>
</html>
